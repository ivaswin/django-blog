{% extends "base.html" %}

{% block content %}
{% load crispy_forms_tags %}
<div class="row">
    <!-- left Side bar -->
  <!-- load sidebar here -->
   {% include 'dashboard/sidebar.html' %} 

    <!-- Right side content -->
     <div class="col-md-9">
        <h2>Edit Blog Post</h2>
        <form action="{% url 'edit_post' post.id %}" method="post" style="width: 500px;" enctype="multipart/form-data">
            {% csrf_token %}
            {{form | crispy}}
           
            <button type="submit" class="btn btn-warning">Submit</button> 
        </form>
        <br>
     </div>

</div>
{%endblock%}
