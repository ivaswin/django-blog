{% extends "base.html" %}

{% block content %}
{% load crispy_forms_tags %}
<div class="row">
    <!-- left Side bar -->
  <!-- load sidebar here -->
   {% include 'dashboard/sidebar.html' %} 

    <!-- Right side content -->
     <div class="col-md-9">
        {% if perms.auth.view_user %}
        <h2>Add New User</h2>
        <form action="{% url 'add_users' %}" method="post" style="width: 500px;">
            {% csrf_token %}
            {{form | crispy}}
           
            <button type="submit" class="btn btn-warning">Submit</button>
        </form>
        <br>
     </div>
     {% else %}
<h5>You do not have permission to view this page</h5>
{% endif %}

</div>
{%endblock%}
